<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Pacientes - Clínica</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 400px; margin: auto; }
        input { width: 100%; margin-bottom: 10px; padding: 8px; }
        button { width: 100%; padding: 10px; background: #24b47e; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Cadastrar Paciente</h2>
    <input type="text" id="nome" placeholder="Nome Completo">
    <input type="text" id="celular" placeholder="Celular (00) 00000-0000">
    <input type="email" id="email" placeholder="E-mail">
    <button onclick="salvar()">Cadastrar no Sistema</button>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
